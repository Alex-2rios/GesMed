<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Receta Médica</title>
    <style>
        body {
            font-family: DejaVu Sans, sans-serif;
            padding: 40px;
            margin: 0;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 120px;
            height: auto;
        }

        h1 {
            text-align: center;
            margin-top: 10px;
            font-size: 24px;
            text-decoration: underline;
        }

        .info {
            margin: 30px 0;
            font-size: 16px;
        }

        .info p {
            margin: 5px 0;
        }

        .section {
            margin-bottom: 25px;
        }

        .section strong {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .section p {
            margin: 0;
            padding-left: 0px;
            text-align: justify;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

    </style>
</head>
<body>

    <div class="logo-container">
    <img src="{{ url_for('static', filename='resours/img/GEStionMEDica.jpg') }}" alt="Logo">
    </div>

    <h1>Receta Médica</h1>

    <div class="info">
        <p><strong>Médico:</strong> {{ nombre_medico }}</p>
        <p><strong>Fecha:</strong> {{ fecha }}</p>
        <p><strong>Paciente:</strong> {{ nombre_paciente }}</p>
        <p><strong>Síntomas:</strong> {{ sintomas }}</p>
        <p><strong>Diagnóstico:</strong>{{ diagnostico }}</p>
        <p><strong>Tratamiento:</strong>{{ tratamiento }}</p>
    </div>



    <div class="footer">
        GESMED - Receta Médica Generada el {{ fecha }}
        </div>
    </div>

</body>
</html>
